name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff
      - name: Lint
        run: ruff check .
      - name: Import smoke test
        run: python -c "import quetzal, quetzal.main, quetzal.ui.app; print('ok')"
      - name: CLI smoke test (lists answerer harnesses; no API keys needed)
        run: quetzal agents
